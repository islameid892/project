# Professional Nginx Configuration with Rate Limiting
# This configuration should be used in production with proper SSL certificates

# Rate limiting zones definition
http {
    # Global rate limiting zone - 10 req/sec per IP
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10r/s;
    
    # API rate limiting zone - 1 req/sec per IP (60 req/min)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s;
    
    # Search rate limiting zone - 0.5 req/sec per IP (30 req/min)
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=0.5r/s;
    
    # Health check zone - no limit (for monitoring)
    limit_req_zone $binary_remote_addr zone=health_limit:10m rate=100r/s;

    # Upstream backend server
    upstream node_backend {
        server localhost:3000;
        keepalive 32;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name drugindex.click www.drugindex.click;
        return 301 https://$host$request_uri;
    }

    # HTTPS server configuration
    server {
        listen 443 ssl http2;
        server_name drugindex.click www.drugindex.click;

        # SSL certificates (update paths to your actual certificates)
        ssl_certificate /etc/ssl/certs/your_cert.crt;
        ssl_certificate_key /etc/ssl/private/your_key.key;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css text/xml;
        gzip_min_length 1024;
        gzip_comp_level 6;
        gzip_vary on;

        # Cache configuration
        client_max_body_size 50m;
        client_body_timeout 120s;
        client_header_timeout 120s;
        keepalive_timeout 65s;

        # Health check endpoint - NO rate limiting
        location /health {
            limit_req zone=health_limit burst=100 nodelay;
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Static files - NO rate limiting, heavy caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            proxy_pass http://node_backend;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header ETag $http_etag;
            access_log off;
        }

        # Search endpoints - STRICT rate limiting (30 req/min)
        location ~ ^/api/trpc/data\.(searchByScientificName|searchByTradeNames|searchByIcdCodes) {
            limit_req zone=search_limit burst=5 nodelay;
            limit_req_status 429;
            
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API endpoints - MODERATE rate limiting (60 req/min)
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Cache API responses for 5 minutes
            proxy_cache_valid 200 5m;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # All other requests - GLOBAL rate limiting (100 req/15min)
        location / {
            limit_req zone=global_limit burst=20 nodelay;
            limit_req_status 429;
            
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Error pages
        error_page 429 @rate_limit_exceeded;
        location @rate_limit_exceeded {
            default_type application/json;
            return 429 '{"error":"Too many requests","message":"Rate limit exceeded. Please try again later.","retryAfter":"60"}';
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
